<!--
  Vite dev-mode entry for the termin-airlock-provider preview harness.

  Run with:
    cd frontend
    npm run dev

  Then open the URL Vite prints (default http://localhost:5173).

  This is the DEV-MODE preview only — the production bundle the
  Termin runtime loads is built via `npm run build` and is wired
  through `src/index.tsx` (the production entry point that registers
  renderers against `window.Termin.registerRenderer`). The dev
  harness mocks the Termin runtime API and mounts each contract
  manually with a sample IR fragment so you can iterate on the
  components without standing up the full Termin server.
-->
